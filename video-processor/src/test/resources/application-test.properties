spring.application.name=video-processor-test

# In-memory DB for tests
spring.datasource.url=jdbc:h2:mem:video_processor_test;MODE=MySQL;DB_CLOSE_DELAY=-1;DB_CLOSE_ON_EXIT=FALSE
spring.datasource.driver-class-name=org.h2.Driver
spring.datasource.username=sa
spring.datasource.password=

# Keep startup simple in test context
spring.jpa.hibernate.ddl-auto=none
spring.liquibase.enabled=false

# App props required by @Value fields
video.file.pathType=file
video.file.path=${java.io.tmpdir}/video-processor-test
video.gif.in-progress.timeout=30

# S3 props required by S3Properties/S3Config bean creation
s3.type=custom
s3.endpoint=http://localhost:9000
s3.accessKey=test-access-key
s3.secretKey=test-secret-key
s3.region=us-east-1

# Kafka props required by KafkaProperties and kafka autoconfig
spring.kafka.bootstrap-servers=localhost:9092
spring.kafka.consumer.group-id=test-group
spring.kafka.video-topic=test-video-topic
spring.kafka.video-finish-topic=test-video-finish-topic
spring.kafka.video-error-topic=test-video-error-topic
spring.kafka.consumer.auto-offset-reset=earliest
spring.kafka.consumer.key-deserializer=org.apache.kafka.common.serialization.StringDeserializer
spring.kafka.consumer.value-deserializer=org.apache.kafka.common.serialization.StringDeserializer
spring.kafka.producer.key-serializer=org.apache.kafka.common.serialization.StringSerializer
spring.kafka.producer.value-serializer=org.apache.kafka.common.serialization.StringSerializer
